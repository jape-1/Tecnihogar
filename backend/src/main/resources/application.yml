spring:
  application:
    name: tecnihogar-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET:secretojwt}
  expiration: ${JWT_EXPIRATION:86400000}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:demo}
  api-key: ${CLOUDINARY_API_KEY:000000000000000}
  api-secret: ${CLOUDINARY_API_SECRET:demo_secreto}

app:
  cors:
    frontend-url: ${FRONTEND_URL:http://localhost:5174}

springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    path: /api/swagger-ui

server:
  port: 8080

logging:
  level:
    com.tecnihogar: DEBUG
    org.springframework.security: INFO
