version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tecnihogar_db
    environment:
      POSTGRES_DB: tecnihogar
      POSTGRES_USER: tecni_user
      POSTGRES_PASSWORD: tecni_pass
    ports:
      - "5441:5432"   
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tecni_user -d tecnihogar"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tecnihogar_backend
    ports:
      - "8081:8080"   
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tecnihogar
      SPRING_DATASOURCE_USERNAME: tecni_user
      SPRING_DATASOURCE_PASSWORD: tecni_pass
      JWT_SECRET: ${JWT_SECRET:-local_dev_secret_32chars_minimum_x}
      JWT_EXPIRATION: 86400000
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-demo}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-000000000000000}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-demo_secret}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5174}
      SPRING_PROFILES_ACTIVE: dev
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: tecnihogar_frontend
    ports:
      - "5174:5173"   
    environment:
      VITE_API_URL: http://localhost:8081/api
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

volumes:
  pgdata:
